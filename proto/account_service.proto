syntax = "proto3";

package account.v1;
option go_package = "github.com/hushine-tech/core-service/gen/accountv1;accountv1";

import "google/protobuf/timestamp.proto";

// Account registry RPCs for BFFs (e.g. quant-handler); wallet RPCs for strategy-service.
service AccountService {
  // Create a user account (internal auth store for quant-handler).
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Verify a user's password and return the matching user metadata.
  rpc VerifyUserPassword(VerifyUserPasswordRequest) returns (VerifyUserPasswordResponse);

  // GetUser fetches user metadata by id. Used by control-panel-service to
  // read users.plan_code during runtime quota / route resolution. Sensitive
  // fields (password_hash) are never returned.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // Create a trading account (same rules as HTTP POST /accounts).
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);

  // List accounts; credentials are never returned.
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);

  // Get one account by id; credentials are never returned.
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);

  rpc CreateVenue(CreateVenueRequest) returns (CreateVenueResponse);
  rpc ListVenues(ListVenuesRequest) returns (ListVenuesResponse);
  rpc GetVenue(GetVenueRequest) returns (GetVenueResponse);
  rpc GetVenueOnlineInfo(GetVenueOnlineInfoRequest) returns (GetVenueOnlineInfoResponse);
  rpc BindVenue(BindVenueRequest) returns (BindVenueResponse);
  rpc ReleaseVenue(ReleaseVenueRequest) returns (ReleaseVenueResponse);
  rpc ArchiveVenue(ArchiveVenueRequest) returns (ArchiveVenueResponse);
  rpc PreflightStrategySession(PreflightStrategySessionRequest) returns (PreflightStrategySessionResponse);
  rpc GetVenueRouteMeta(GetVenueRouteMetaRequest) returns (GetVenueRouteMetaResponse);

  // Phase 2 canonical portfolio snapshot API. It reads active account venues
  // through the exchange capability registry and returns account-level summary
  // plus per-venue balances/positions.
  rpc GetPortfolioSnapshot(GetPortfolioSnapshotRequest) returns (GetPortfolioSnapshotResponse);

  // Refresh and persist the current portfolio snapshot. Exchange-backed
  // accounts read from active venues; backtest accounts read local state.
  rpc UpdatePortfolioSnapshot(UpdatePortfolioSnapshotRequest) returns (UpdatePortfolioSnapshotResponse);

  // Push strategy-computed wallet state for snapshot/audit sync.
  // Backtest accounts persist it as authoritative local state; exchange-backed
  // accounts use it as the local side of reconciliation.
  rpc UpdateAccountWalletState(UpdateAccountWalletStateRequest) returns (UpdateAccountWalletStateResponse);

  // Cached tradable symbols for portal pickers (Binance public exchangeInfo). market: "spot" | "usdm_futures".
  rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsResponse);

  // Internal RPC: returns full account config including API credentials.
  // Intended for the internal order module only; NOT exposed to BFFs/portals.
  rpc GetAccountMeta(GetAccountMetaRequest) returns (GetAccountMetaResponse);

  // ── 策略管理 ────────────────────────────────────────────────────────────────

  // 创建策略（immutable，创建后不可修改）
  rpc CreateStrategy(CreateStrategyRequest) returns (CreateStrategyResponse);

  // 列出所有策略（可选按名称过滤）
  rpc ListStrategies(ListStrategiesRequest) returns (ListStrategiesResponse);

  // 获取单个策略（含 code）
  rpc GetStrategy(GetStrategyRequest) returns (GetStrategyResponse);

  // 归档策略（软删除，不可挂载已归档策略）
  rpc ArchiveStrategy(ArchiveStrategyRequest) returns (ArchiveStrategyResponse);

  // ── 帐号策略挂载管理 ──────────────────────────────────────────────────────

  // 挂载策略到帐号
  rpc MountStrategy(MountStrategyRequest) returns (MountStrategyResponse);

  // 从帐号卸载策略
  rpc UnmountStrategy(UnmountStrategyRequest) returns (UnmountStrategyResponse);

  // 激活帐号上的某个已挂载策略（同时使其他策略变为非 active）
  rpc ActivateStrategy(ActivateStrategyRequest) returns (ActivateStrategyResponse);

  // 取消激活策略（不卸载，仅设为非 active）
  rpc DeactivateStrategy(DeactivateStrategyRequest) returns (DeactivateStrategyResponse);

  // 列出帐号上所有已挂载策略
  rpc ListAccountStrategies(ListAccountStrategiesRequest) returns (ListAccountStrategiesResponse);

  // 获取帐号当前 active 策略（strategy-service 调用）
  rpc GetActiveStrategy(GetActiveStrategyRequest) returns (GetActiveStrategyResponse);

  // ── 策略运行记录（Session）────────────────────────────────────────────────

  // 保存新 session（strategy-service 调用）
  rpc SaveSession(SaveSessionRequest) returns (SaveSessionResponse);

  // 更新 session 状态（completed/stopped/failed/recoverable）
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);

  // 获取单个 session
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);

  // 列出帐号的所有 sessions
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // 列出所有 running sessions（用于服务重启恢复）
  rpc ListRunningSessions(ListRunningSessionsRequest) returns (ListRunningSessionsResponse);

  // 将指定 runtime 拥有的 active sessions 标记为 recoverable。
  rpc MarkRuntimeSessionsRecoverable(MarkRuntimeSessionsRecoverableRequest) returns (MarkRuntimeSessionsRecoverableResponse);

  // 列出 session 关联的快照
  rpc ListSessionSnapshots(ListSessionSnapshotsRequest) returns (ListSessionSnapshotsResponse);

  // 列出 session 关联的 reconciliation compare runs（Phase C / C3 审计入口）
  rpc ListReconciliationRuns(ListReconciliationRunsRequest) returns (ListReconciliationRunsResponse);

  // session 维度的 reconciliation 聚合（总数 / hard fail / soft fail）。
  // SessionDetailPage 用它驱动顶部 tile，而不是依赖当前页计数。
  rpc GetSessionReconciliationSummary(GetSessionReconciliationSummaryRequest) returns (GetSessionReconciliationSummaryResponse);

  // ── 通知管理（Notification Management）────────────────────────────────────

  // 获取当前用户通知偏好、plan 权限、Telegram 绑定状态和 bot 用户名。
  rpc GetNotificationSettings(GetNotificationSettingsRequest) returns (GetNotificationSettingsResponse);

  // 更新当前用户通知偏好。Plan 禁用的类别仍可存储偏好，但发送时 fail-closed。
  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest) returns (UpdateNotificationPreferencesResponse);

  // 创建一次性 Telegram 绑定码。明文 bind_code 只在本响应中返回一次。
  rpc CreateNotificationBindCode(CreateNotificationBindCodeRequest) returns (CreateNotificationBindCodeResponse);

  // 用户在 Telegram 发送绑定码后，页面调用该 RPC 刷新/确认绑定状态。
  rpc ConfirmNotificationBinding(ConfirmNotificationBindingRequest) returns (ConfirmNotificationBindingResponse);

  // 解绑当前用户的 Telegram 通知接收端。
  rpc UnbindNotificationChannel(UnbindNotificationChannelRequest) returns (UnbindNotificationChannelResponse);

  // 发送测试通知。用于验证当前 plan、偏好和 Telegram 绑定是否有效。
  rpc SendTestNotification(SendTestNotificationRequest) returns (SendTestNotificationResponse);

  // Phase D2 (2026-05-06): the demand-driven market-data control plane
  // (CreateMarketDataRequest / CancelMarketDataRequest /
  // ListMarketDataRequests / GetMarketDataStreamStatus /
  // ListMarketDataStreams / ListMarketDataHistoryRequests /
  // ReportMarketDataStreamState / ReportMarketDataHistoryRequestState /
  // CreateOrRenewMarketDataLease / ReleaseMarketDataLease) was moved out
  // of core-service into control-panel-service. The new home is
  // `controlpanel.marketdata.v1.MarketDataControlPlaneService` —
  // see `control-panel-service/proto/marketdata_service.proto`. Field
  // numbers were preserved across the rename so wire-format diffs are
  // minimal; callers were repointed in the same PR (scraper /
  // quant-handler / strategy-service).
}

message User {
  int64 id = 1;
  string username = 2;
  google.protobuf.Timestamp created_at = 3;
  // plan_code maps to control-panel-service's runtime_plans config tier.
  // Added with migration 0011_add_user_plan_code.sql (Phase D1).
  string plan_code = 4;
}

message GetUserRequest {
  int64 user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
}

message CreateUserResponse {
  User user = 1;
}

message VerifyUserPasswordRequest {
  string username = 1;
  string password = 2;
}

message VerifyUserPasswordResponse {
  User user = 1;
  bool valid = 2;
}

message ListAccountsRequest {
  int32 limit = 1;
  int32 offset = 2;
  int64 user_id = 100;
}

message ListAccountsResponse {
  repeated AccountRegistryEntry accounts = 1;
  bool has_more = 2;
  int64 total = 3;
}

message GetAccountRequest {
  int64 account_id = 1;
  int64 user_id = 100;
}

message GetAccountResponse {
  AccountRegistryEntry account = 1;
}

message CreateAccountRequest {
  string name = 1;
  int32 environment = 2;
  reserved 3, 4, 5, 6, 7; // removed: account credentials, wallet seed, and market modes now live on venues
  double slippage_bps = 8;     // default: 0.0
  double default_fee_rate = 9; // default: 0.0004
  string description = 10;
  int64 user_id = 100;
}

message CreateAccountResponse {
  int64 account_id = 1;
  string name = 2;
  int32 environment = 3;
  google.protobuf.Timestamp created_at = 4;
  string description = 5;
  int32 status = 6;
}

// Account metadata without API credentials (safe for portal responses).
message AccountRegistryEntry {
  int64 account_id = 1;
  string name = 2;
  int32 environment = 3;
  google.protobuf.Timestamp created_at = 4;
  int64 user_id = 5;
  string description = 6;
  int32 status = 7;
}

message VenueEntry {
  int64 venue_id = 1;
  int64 user_id = 2;
  int64 account_id = 3;
  int32 exchange = 4;
  int32 market = 5;
  int32 environment = 6;
  int32 status = 7;
  string display_name = 8;
  string description = 9;
  string api_key = 10;
  string credential_fingerprint = 11;
  int32 margin_mode = 12;
  int32 position_mode = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  google.protobuf.Timestamp last_used_at = 16;
  google.protobuf.Timestamp archived_at = 17;
  string archived_reason = 18;
}

message CreateVenueRequest {
  int64 user_id = 1;
  int64 account_id = 2;
  int32 exchange = 3;
  int32 market = 4;
  int32 environment = 5;
  int32 status = 6;
  string display_name = 7;
  string description = 8;
  string api_key = 9;
  string credential_json = 10;
  int32 margin_mode = 11;
  int32 position_mode = 12;
  FuturesWallet futures = 13;
  SpotWallet spot = 14;
  double total_value = 15;
  double wallet_balance = 16;
  double available_balance = 17;
}

message CreateVenueResponse {
  VenueEntry venue = 1;
}

message ListVenuesRequest {
  int64 user_id = 1;
  int64 account_id = 2;
  bool include_unbound = 3;
  bool include_inactive = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message ListVenuesResponse {
  repeated VenueEntry venues = 1;
  bool has_more = 2;
  int64 total = 3;
}

message GetVenueRequest {
  int64 user_id = 1;
  int64 venue_id = 2;
}

message GetVenueResponse {
  VenueEntry venue = 1;
}

message GetVenueOnlineInfoRequest {
  int64 user_id = 1;
  int64 venue_id = 2;
}

message GetVenueOnlineInfoResponse {
  VenueEntry venue = 1;
  AccountWalletState wallet = 2;
}

message BindVenueRequest {
  int64 user_id = 1;
  int64 account_id = 2;
  int64 venue_id = 3;
  string reason = 4;
}

message BindVenueResponse {
  VenueEntry venue = 1;
}

message ReleaseVenueRequest {
  int64 user_id = 1;
  int64 venue_id = 2;
  string reason = 3;
}

message ReleaseVenueResponse {
  VenueEntry venue = 1;
}

message ArchiveVenueRequest {
  int64 user_id = 1;
  int64 venue_id = 2;
  string reason = 3;
}

message ArchiveVenueResponse {}

message RequiredRoute {
  int32 exchange = 1;
  int32 market = 2;
}

message RequiredSymbol {
  int32 exchange = 1;
  int32 market = 2;
  string symbol = 3;
}

message PreflightIssue {
  string code = 1;
  string message = 2;
  int32 exchange = 3;
  int32 market = 4;
  string symbol = 5;
}

message PreflightStrategySessionRequest {
  int64 user_id = 1;
  int64 account_id = 2;
  repeated RequiredRoute required_routes = 3;
  repeated RequiredSymbol required_symbols = 4;
  string session_id = 5;
  int64 strategy_id = 6;
}

message PreflightStrategySessionResponse {
  bool ok = 1;
  repeated PreflightIssue issues = 2;
  repeated VenueEntry resolved_venues = 3;
}

message GetVenueRouteMetaRequest {
  int64 account_id = 1;
  int32 exchange = 2;
  int32 market = 3;
}

message GetVenueRouteMetaResponse {
  int64 account_id = 1;
  int64 venue_id = 2;
  int64 user_id = 3;
  int32 environment = 4;
  int32 exchange = 5;
  int32 market = 6;
  int32 margin_mode = 7;
  int32 position_mode = 8;
  string api_key = 9;
  string credential_json = 10;
  double default_fee_rate = 11;
  double slippage_bps = 12;
}

message GetPortfolioSnapshotRequest {
  int64 account_id = 1;
  int64 user_id = 100;
}

message GetPortfolioSnapshotResponse {
  PortfolioSnapshot snapshot = 1;
}

message UpdatePortfolioSnapshotRequest {
  int64 account_id = 1;
  int64 user_id = 2;
  int32 snapshot_reason = 3;
  int64 strategy_id = 4;
  string session_id = 5;
  // 回测/行情事件时间；为空时快照使用服务端处理时间。
  google.protobuf.Timestamp snapshot_time = 6;
}

message UpdatePortfolioSnapshotResponse {
  PortfolioSnapshot snapshot = 1;
}

message UpdateAccountWalletStateRequest {
  int64 account_id = 1;
  reserved 2;
  FuturesWallet futures = 3;
  SpotWallet spot = 4;
  double total_value = 5;
  double wallet_balance = 6;
  double available_balance = 7;
  int32 snapshot_reason = 8;
  int64 strategy_id = 9;
  string session_id = 10;
  // 回测/行情事件时间；为空时快照使用服务端处理时间。
  google.protobuf.Timestamp snapshot_time = 11;
  int64 user_id = 100;
}

message UpdateAccountWalletStateResponse {
  AccountWalletState wallet = 1;
}

message PortfolioSnapshot {
  int64 account_id = 1;
  int64 user_id = 2;
  double total_value = 3;
  double wallet_balance = 4;
  double available_balance = 5;
  google.protobuf.Timestamp updated_at = 6;
  repeated VenueSnapshot venues = 7;
  AccountWalletState wallet = 8;
}

message VenueSnapshot {
  int64 venue_id = 1;
  int32 exchange = 2;
  int32 environment = 3;
  int32 market = 4;
  double total_value = 5;
  double wallet_balance = 6;
  double available_balance = 7;
  google.protobuf.Timestamp updated_at = 8;
  repeated BalanceEntry balances = 9;
  repeated PositionEntry positions = 10;
  AccountWalletState wallet = 11;
}

message BalanceEntry {
  string asset = 1;
  double wallet_balance = 2;
  double available_balance = 3;
  double locked = 4;
  double value_usdt = 5;
}

message PositionEntry {
  string symbol = 1;
  string position_side = 2;
  double qty = 3;
  double entry_price = 4;
  double mark_price = 5;
  double unrealized_pnl = 6;
  double margin_balance = 7;
  double liquidation_price = 8;
}

// Canonical wallet payload (aligned with strategy_service.wallet_factory / Account).
message AccountWalletState {
  FuturesWallet futures = 1;
  SpotWallet spot = 2;
  double total_value = 3;
  // Server-side account environment (0=backtest, 1=demo, 2=live).
  int32 environment = 6;
  google.protobuf.Timestamp updated_at = 7;
  // Display aggregates: for Binance demo/live, futures_position_equity matches futures.margin_balance
  // and spot_estimated_value matches the exchange adapter spot sum so spot + futures ≈ total_value.
  double spot_estimated_value = 8;
  double futures_position_equity = 9;
  bool metrics_authoritative = 10;
}

message FuturesWallet {
  string margin_mode = 1;
  string position_mode = 2;
  double initial_balance = 3;
  double deposit_sum = 4;
  double withdrawal_sum = 5;
  repeated FuturesPosition positions = 6;
  double wallet_balance = 7;
  double available_balance = 8;
  double total_unrealized_pnl = 9;
  // Phase A: Binance-standard account-level fields (additive, field #100+).
  double total_margin_balance = 100;
  double total_position_initial_margin = 101;
  double total_open_order_initial_margin = 102;
  double total_maint_margin = 103;
  double total_cross_wallet_balance = 104;
  double total_cross_un_pnl = 105;
  repeated FuturesRiskMetadata risk_metadata = 106;
  // Phase B canonical account-level aliases.
  double margin_balance = 110;
  double unrealized_pnl = 111;
  bool multi_assets_mode = 112;
  bool portfolio_margin = 113;
  // Display-only exchange totals for multi-assets mode. These preserve Binance's
  // account-level USD aggregates without changing the canonical main-asset
  // wallet semantics used by strategy/runtime code.
  double display_wallet_balance_usd = 114;
  double display_margin_balance_usd = 115;
  double display_unrealized_pnl_usd = 116;
}

message FuturesPosition {
  string symbol = 1;
  int32 direction = 2;
  double initial_balance = 3;
  double leverage = 4;
  double fee_rate = 5;
  double mark_price = 6;
  double qty = 7;
  double entry_price = 8;
  double unrealized_pnl = 9;
  string position_side = 10;
  // Isolated-mode row estimate (IM + wallet shell + unrealized); unset for cross or when not computable.
  optional double display_equity = 11;
  // Phase A: Binance-standard position fields (additive, field #100+).
  string margin_type = 100; // "cross" / "isolated"
  double notional = 101;
  double initial_margin = 102;
  double position_initial_margin = 103;
  double open_order_initial_margin = 104;
  double maint_margin = 105;
  double isolated_wallet = 106;
  double liquidation_price = 107;
  double break_even_price = 108;
  // Phase B canonical aliases.
  double position_qty = 109;
  string margin_mode = 110;
}

message FuturesRiskMetadata {
  string symbol = 1;
  double configured_leverage = 2;
  string configured_margin_mode = 3;
  int32 price_precision = 4;
  int32 quantity_precision = 5;
  double tick_size = 6;
  double step_size = 7;
  repeated FuturesRiskBracket brackets = 8;
}

message FuturesRiskBracket {
  int32 bracket = 1;
  double notional_floor = 2;
  double notional_cap = 3;
  double initial_leverage = 4;
  double maint_margin_ratio = 5;
  double cumulative = 6;
}

message SpotWallet {
  double free = 1;
  double locked = 2;
  repeated SpotAsset assets = 3;
}

message SpotAsset {
  string symbol = 1;
  double qty = 2;
  double locked = 3;
  double avg_entry_price = 4;
  optional double price = 5;
}

message ListSymbolsRequest {
  // "spot" — USDT spot pairs; "usdm_futures" — USDT-M perpetuals.
  string market = 1;
  string query = 2;
  int32 limit = 3;
}

message ListSymbolsResponse {
  repeated string symbols = 1;
  // True when serving last good cache because refresh failed.
  bool stale = 2;
}

message GetAccountMetaRequest {
  int64 account_id = 1;
}

// Full account config returned to the internal order module (internal use only — contains API credentials).
message GetAccountMetaResponse {
  int64 account_id = 1;
  int32 environment = 2;     // 0=backtest, 1=demo, 2=live
  string margin_mode = 3;    // "cross" / "isolated"
  string position_mode = 4;  // "one_way" / "hedge"
  string api_key = 5;
  string api_secret = 6;
  double default_fee_rate = 7;
  double slippage_bps = 8;
  int64 user_id = 9;
}

// ── 策略管理消息 ─────────────────────────────────────────────────────────────

message StrategyEntry {
  int64 strategy_id = 1;
  string name = 2;
  string version = 3;
  string description = 4;
  bool archived = 5;
  google.protobuf.Timestamp created_at = 6;
  // code 仅在 GetStrategy 响应中填充，列表接口不返回
  string code = 7;
  int64 user_id = 8;
  string runtime_version = 9;
  string runtime_profile = 10;
}

message CreateStrategyRequest {
  string name = 1;
  string version = 2;
  string description = 3;
  string code = 4;
  string runtime_version = 5;
  string runtime_profile = 6;
  int64 user_id = 100;
}

message CreateStrategyResponse {
  StrategyEntry strategy = 1;
}

message ListStrategiesRequest {
  // 可选名称前缀过滤
  string name_prefix = 1;
  // true=只返回未归档，false/unset=全部
  bool active_only = 2;
  int32 limit = 3;
  int32 offset = 4;
  int64 user_id = 100;
}

message ListStrategiesResponse {
  repeated StrategyEntry strategies = 1;
  bool has_more = 2;
  int64 total = 3;
}

message GetStrategyRequest {
  int64 strategy_id = 1;
  int64 user_id = 100;
}

message GetStrategyResponse {
  StrategyEntry strategy = 1;
}

message ArchiveStrategyRequest {
  int64 strategy_id = 1;
  int64 user_id = 100;
}

message ArchiveStrategyResponse {}

message MountStrategyRequest {
  int64 account_id = 1;
  int64 strategy_id = 2;
  int64 user_id = 100;
}

message MountStrategyResponse {}

message UnmountStrategyRequest {
  int64 account_id = 1;
  int64 strategy_id = 2;
  int64 user_id = 100;
}

message UnmountStrategyResponse {}

message ActivateStrategyRequest {
  int64 account_id = 1;
  int64 strategy_id = 2;
  int64 user_id = 100;
}

message ActivateStrategyResponse {}

message DeactivateStrategyRequest {
  int64 account_id = 1;
  int64 strategy_id = 2;
  int64 user_id = 100;
}

message DeactivateStrategyResponse {}

message ListAccountStrategiesRequest {
  int64 account_id = 1;
  int64 user_id = 100;
}

message AccountStrategyEntry {
  StrategyEntry strategy = 1;
  bool active = 2;
  google.protobuf.Timestamp mounted_at = 3;
}

message ListAccountStrategiesResponse {
  repeated AccountStrategyEntry entries = 1;
}

message GetActiveStrategyRequest {
  int64 account_id = 1;
}

message GetActiveStrategyResponse {
  // strategy_id=0 表示无 active 策略
  int64 strategy_id = 1;
  string code = 2;
  string name = 3;
  string version = 4;
  string runtime_version = 5;
  string runtime_profile = 6;
}

// ── 策略运行记录（Session）消息 ──────────────────────────────────────────────

message StrategySessionEntry {
  string session_id = 1;
  int64 account_id = 2;
  int64 strategy_id = 3;
  int32 environment = 4;
  string status = 5;
  string interval = 6;
  int64 start_time_ms = 7;
  int64 end_time_ms = 8;
  int32 bars_processed = 9;
  string error = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp completed_at = 12;
  google.protobuf.Timestamp created_at = 13;
  int64 user_id = 14;
  string runtime_id = 15;
  string runtime_source = 16;
  string runtime_name = 17;
  string session_type = 18;
  string runtime_version = 19;
  string session_name = 20;
  string error_code = 21;
  string error_message = 22;
  string error_detail_json = 23;
}

message SaveSessionRequest {
  string session_id = 1;
  int64 account_id = 2;
  int64 strategy_id = 3;
  int32 environment = 4;
  string interval = 5;
  int64 start_time_ms = 6;
  int64 end_time_ms = 7;
  string runtime_id = 8;
  string runtime_source = 9;
  string runtime_name = 10;
  string session_type = 11;
  string runtime_version = 12;
  string session_name = 13;
  int64 user_id = 100;
}

message SaveSessionResponse {}

message UpdateSessionRequest {
  string session_id = 1;
  string status = 2;           // running / stopping / recoverable / completed / stopped / failed / stop_failed
  int32 bars_processed = 3;
  string error = 4;
  string runtime_id = 5;       // optional guard; when set, must match owning runtime
}

message UpdateSessionResponse {}

message GetSessionRequest {
  string session_id = 1;
  int64 user_id = 100;
}

message GetSessionResponse {
  StrategySessionEntry session = 1;
}

message ListSessionsRequest {
  // 0 means all accounts owned by user_id; non-zero keeps legacy account-scoped behavior.
  int64 account_id = 1;
  int32 limit = 2;
  int32 offset = 3;
  string runtime_id = 4;
  int64 strategy_id = 5;
  int32 environment = 6;
  bool environment_set = 7;
  string status = 8;
  string session_id_contains = 9;
  int64 started_after_ms = 10;
  int64 started_before_ms = 11;
  int64 user_id = 100;
}

message ListSessionsResponse {
  repeated StrategySessionEntry sessions = 1;
  bool has_more = 2;
  int64 total = 3;
}

message ListRunningSessionsRequest {
  string runtime_id = 1;       // optional filter; empty preserves legacy global listing
}

message ListRunningSessionsResponse {
  repeated StrategySessionEntry sessions = 1;
}

message MarkRuntimeSessionsRecoverableRequest {
  string runtime_id = 1;
  string error = 2;
}

message MarkRuntimeSessionsRecoverableResponse {
  int64 sessions_marked = 1;
}

message ListSessionSnapshotsRequest {
  string session_id = 1;
  int32 limit = 2;   // default 20, clamped to [1, 200] server-side
  int32 offset = 3;  // default 0; offset-based paging on time DESC order
  int64 user_id = 100;
}

message ListSessionSnapshotsResponse {
  // Renamed from ``snapshots`` — see ``paginate-session-detail-lists``:
  // every audit list on the core-service surface uses the same
  // {items, next_offset, has_more, total} shape now.
  repeated SnapshotEntry items = 1;
  int32 next_offset = 2;
  bool  has_more    = 3;
  int64 total       = 4;
}

message SnapshotEntry {
  google.protobuf.Timestamp time = 1;
  int64 account_id = 2;
  int32 snapshot_reason = 3;
  double total_value = 4;
  double wallet_balance = 5;
  double available_balance = 6;
  string futures_json = 7;
  string spot_json = 8;
  string session_id = 9;
  int64 strategy_id = 10;
}

message ListReconciliationRunsRequest {
  string session_id = 1;
  int32 limit = 2;   // default 20, clamped to [1, 200] server-side
  int32 offset = 3;  // default 0; offset-based paging on time DESC order
  int64 user_id = 100;
}

message ListReconciliationRunsResponse {
  // Renamed from ``runs`` — see ``paginate-session-detail-lists``.
  repeated ReconciliationRunEntry items = 1;
  int32 next_offset = 2;
  bool  has_more    = 3;
  int64 total       = 4;
}

message GetSessionReconciliationSummaryRequest {
  string session_id = 1;
  int64  user_id    = 100;
}

message GetSessionReconciliationSummaryResponse {
  int64 total_runs      = 1;
  int64 hard_fail_runs  = 2;
  int64 soft_fail_runs  = 3;
}

message ReconciliationRunEntry {
  google.protobuf.Timestamp time = 1;
  string run_id = 2;
  int64 account_id = 3;
  int64 strategy_id = 4;
  string session_id = 5;
  int32 snapshot_reason = 6;
  string run_type = 7;
  int32 environment = 8;
  bool hard_pass = 9;
  bool soft_pass = 10;
  repeated FieldDiffEntry field_diffs = 11;
  repeated FieldDiffEntry advisory_diffs = 12;
  string local_snapshot_json = 13;
  string exchange_snapshot_json = 14;
  string venue_diffs_json = 15;
}

message FieldDiffEntry {
  string field = 1;
  string severity = 2;
  double exchange = 3;
  double local = 4;
  double diff_abs = 5;
  double diff_ratio = 6;
  string threshold_json = 7;
  bool passed = 8;
}

// ── 通知管理（Notification Management）消息 ────────────────────────────────

message NotificationPlan {
  string plan_code = 1;
  bool notification_enabled = 2;
  bool allow_system = 3;
  bool allow_strategy = 4;
  bool allow_custom = 5;
  int32 custom_rate_limit_per_minute = 6;
  int32 custom_rate_limit_burst = 7;
}

message NotificationPreferences {
  bool system_enabled = 1;
  bool strategy_enabled = 2;
  bool custom_enabled = 3;
  optional bool enabled = 4;
}

message NotificationChannel {
  string channel = 1;                // currently "telegram"
  string status = 2;                 // unbound / pending / bound / revoked
  string provider_username = 3;
  string provider_display_name = 4;
  google.protobuf.Timestamp bound_at = 5;
  google.protobuf.Timestamp last_delivery_at = 6;
  string last_delivery_status = 7;   // ok / failed / unbound / disabled / plan_disabled / rate_limited / invalid_event
  string last_delivery_error = 8;
}

message GetNotificationSettingsRequest {
  int64 user_id = 1;
}

message GetNotificationSettingsResponse {
  NotificationPreferences preferences = 1;
  NotificationPlan plan = 2;
  NotificationChannel telegram = 3;
  string bot_username = 4;
}

message UpdateNotificationPreferencesRequest {
  int64 user_id = 1;
  NotificationPreferences preferences = 2;
}

message UpdateNotificationPreferencesResponse {
  GetNotificationSettingsResponse settings = 1;
}

message CreateNotificationBindCodeRequest {
  int64 user_id = 1;
  string channel = 2; // currently "telegram"; empty defaults to telegram
}

message CreateNotificationBindCodeResponse {
  string bind_code = 1;
  google.protobuf.Timestamp expires_at = 2;
  string bot_username = 3;
}

message ConfirmNotificationBindingRequest {
  int64 user_id = 1;
  string channel = 2; // currently "telegram"; empty defaults to telegram
}

message ConfirmNotificationBindingResponse {
  GetNotificationSettingsResponse settings = 1;
}

message UnbindNotificationChannelRequest {
  int64 user_id = 1;
  string channel = 2; // currently "telegram"; empty defaults to telegram
}

message UnbindNotificationChannelResponse {
  GetNotificationSettingsResponse settings = 1;
}

message SendTestNotificationRequest {
  int64 user_id = 1;
}

message SendTestNotificationResponse {
  bool accepted = 1;
  GetNotificationSettingsResponse settings = 2;
}
